spring:
  datasource:
    content:
      druid:
        url: jdbc:mysql://localhost:3306/silence-content?allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
        username: root
        password: admin123456
        driverClassName: com.mysql.cj.jdbc.Driver


code-generator:
  strategy:
    # 默认策略：TEMPLATE, LLM, HYBRID
    default: TEMPLATE
    # 各层级策略配置
    layers:
      console: LLM
      service: LLM
      service-api: LLM
      enum: LLM
      frontend: LLM

  llm:
    provider: DEEPSEEK  # OPENAI, CLAUDE, OLLAMA, DEEPSEEK
    temperature: 0.3
    max-tokens: 4000
    timeout: 30000
    # DeepSeek配置
    deepseek:
      api-key: sk-0e6d0fcc46c14f528e2ac411a7868c6d
      base-url: https://api.deepseek.com
      model: deepseek-coder  # deepseek-coder, deepseek-chat
    # OpenAI配置
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key}
      base-url: https://api.openai.com/v1
      model: gpt-4o-mini