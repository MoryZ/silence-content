server:
    port: 8081


silence:
  system:
    identifier: CCC


code-generator:
  strategy:
    # 默认策略：TEMPLATE, LLM, HYBRID
    default: TEMPLATE
    # 各层级策略配置
    layers:
      console: LLM
      service: LLM
      service-api: LLM
      enum: LLM
      frontend: LLM

  llm:
    provider: DEEPSEEK  # OPENAI, CLAUDE, OLLAMA, DEEPSEEK
    temperature: 0.3
    max-tokens: 4000
    timeout: 30000
    # DeepSeek配置
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
      base-url: https://api.deepseek.com
      model: deepseek-coder  # deepseek-coder, deepseek-chat
    # OpenAI配置
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key}
      base-url: https://api.openai.com/v1
      model: gpt-4o-mini

  output:
    api-doc: silence-content-api-docs
    service: silence-content-service/src/main/java
    service-api: silence-content-service-api/src/main/java
    console: silence-content-console/src/main/java
    enum: silence-content-service-enums/src/main/java
    frontend: frontend/src